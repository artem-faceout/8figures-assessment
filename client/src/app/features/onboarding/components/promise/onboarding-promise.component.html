<div class="promise-screen">
  <div class="grid-overlay"></div>

  <div class="header">
    <h1 class="headline">
      Meet your AI portfolio
      <span class="accent-text">companion.</span>
    </h1>
  </div>

  <div class="chat-preview">
    <div class="user-bubble">
      <p>How's my portfolio doing today?</p>
    </div>

    <div class="ai-bubble">
      <div class="ai-header">
        <div class="ai-avatar">
          <img src="assets/onboarding/ai-avatar.svg" alt="" width="16" height="14" />
        </div>
        <span class="ai-label">8FIGURES AI</span>
      </div>

      <div class="ai-body">
        <p class="ai-text">
          Your portfolio is up <strong class="gain-text">2.4%</strong> since
          market open.
        </p>

        <div class="mini-portfolio">
          <div class="holding-row">
            <div class="holding-icon">
              <img src="assets/onboarding/aapl-logo.png" alt="AAPL" width="24" height="24" />
            </div>
            <div class="holding-info">
              <span class="holding-ticker">AAPL</span>
              <span class="holding-name">APPLE INC.</span>
            </div>
            <div class="holding-perf">
              <span class="holding-change gain-text">+1.2%</span>
              <span class="holding-label">OUTPERFORMING</span>
            </div>
          </div>

          <div class="holding-row">
            <div class="holding-icon">
              <img src="assets/onboarding/nvda-logo.png" alt="NVDA" width="24" height="24" />
            </div>
            <div class="holding-info">
              <span class="holding-ticker">NVDA</span>
              <span class="holding-name">NVIDIA CORP.</span>
            </div>
            <div class="holding-perf">
              <span class="holding-change gain-text">+4.8%</span>
              <span class="holding-label">AI SURGE</span>
            </div>
          </div>
        </div>

        <p class="ai-quote">
          "NVIDIA is driving most of your growth today following the morning
          earnings report."
        </p>
      </div>

      <div class="insight-chip">
        <img src="assets/onboarding/icon-sparkle.svg" alt="" width="13" height="13" />
        <span>SMART INSIGHT</span>
      </div>
    </div>
  </div>

  <div class="footer">
    <button class="cta-button" (click)="onContinue()">
      Continue
      <img src="assets/onboarding/icon-arrow-right.svg" alt="" width="16" height="16" class="arrow-icon" />
    </button>
  </div>
</div>
