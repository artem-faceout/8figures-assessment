<ion-content class="dashboard-content" [fullscreen]="true">
  @if (portfolioService.portfolio(); as portfolio) {
    <div class="dashboard-scroll">
      <app-portfolio-summary
        [portfolio]="portfolio"
        data-tour="portfolio-summary"
      />

      <app-insight-card
        [insight]="portfolioService.insight()"
        [loading]="portfolioService.insightLoading()"
        [error]="portfolioService.insightError()"
        data-tour="insight-card"
      />

      <div class="holdings-header">
        <h2 class="holdings-title">HOLDINGS</h2>
        <span class="view-all">VIEW ALL</span>
      </div>

      @for (holding of portfolio.holdings; track holding.ticker; let first = $first) {
        <app-holding-row
          [holding]="holding"
          [attr.data-tour]="first ? 'holding-row' : null"
          (tapped)="onHoldingTap($event)"
        />
      }

      <div class="bottom-spacer"></div>
    </div>
  } @else {
    <div class="empty-state">
      <p class="empty-text">No holdings yet</p>
      <p class="empty-subtext">Chat with AI to build your portfolio</p>
    </div>
  }

  <ion-fab slot="fixed" vertical="bottom" horizontal="center">
    <ion-fab-button class="chat-fab" data-tour="chat-fab" (click)="onFabTap()">
      <ion-icon name="sparkles"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>

@if (tourService.tourActive()) {
  <app-tour-overlay />
}
